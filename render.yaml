services:
  - type: web
    name: morocco-whatsapp-crm
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npx prisma generate && cd frontend && npm install && npm run build
    startCommand: npx prisma migrate deploy && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: morocco-crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: VERIFY_TWILIO_SIGNATURE
        value: "false"

databases:
  - name: morocco-crm-db
    plan: free
    region: frankfurt
